name: "Linting and formatting on PR"
on:
  pull_request:
    branches:
      - '**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: action/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"
                
      - name: Install Dependencies
        run: pnpm install
        
      - name: Run Build
        run: pnpm run build